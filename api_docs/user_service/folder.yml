info:
  name: user_service
  type: folder
  seq: 1

request:
  headers:
    - name: Accept
      value: application/json
  auth:
    type: bearer
    token: "{{accessToken}}"
  variables:
    - name: url
      value: "{{baseUrl}}8000/api/v1/auth"
    - name: refreshToken
      value: ""
    - name: accessToken
      value: ""
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: ""
        method: jsonq
      variable:
        name: ""
        scope: runtime
      disabled: true
