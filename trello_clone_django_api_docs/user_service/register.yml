info:
  name: register
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/register/"
  headers:
    - name: Accept
      value: application/json
  body:
    type: form-urlencoded
    data:
      - name: username
        value: testuser11
      - name: email
        value: test11@test.com
      - name: password
        value: password@123
      - name: password_confirm
        value: password@123
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        let accessToken = res.body["tokens"]["access"]
        let refreshToken = res.body["tokens"]["refresh"]
        bru.setEnvVar("accessToken", accessToken)
        bru.setEnvVar("refreshToken", refreshToken)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
