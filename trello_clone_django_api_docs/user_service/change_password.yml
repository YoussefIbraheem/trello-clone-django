info:
  name: change_password
  type: http
  seq: 4

http:
  method: POST
  url: "{{url}}/change-password/"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: current_password
        type: text
        value: password@123
      - name: new_password
        type: text
        value: password@456
      - name: confirm_new_password
        type: text
        value: password@456
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
