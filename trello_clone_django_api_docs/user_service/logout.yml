info:
  name: logout
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/logout/"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: refresh_token
        type: text
        value: "{{refreshToken}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
